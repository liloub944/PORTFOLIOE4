<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Connnexion Médecin</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f2f2f2;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #ffffff;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo img {
            max-width: 140px;
            height: auto;
        }

        .responsive-form {
            margin: 0 auto;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: normal;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #35a6c2;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #2a8da8;
        }

        @media (min-width: 600px) {
            .form-group {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .form-group label {
                width: 30%;
                margin-bottom: 0;
            }

            .form-group input,
            .form-group textarea,
            .form-group select {
                width: 68%;
            }

            button {
                width: auto;
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <a href="#">
                <img src="somnolink logo.png" alt="Site Logo">
            </a>
        </div>
        <form action="traitementconnectMedecin.php" method="post" class="responsive-form">
            <div class="form-group">
                <label for="courrielMed">Courriel:</label>
                <input type="email" id="courrielMed" name="courrielMed" required>
            </div>
            <div class="form-group">
                <label for="mdpMed">Mot de passe:</label>
                <input type="password" id="mdpMed" name="mdpMed" required>
            </div>
            <button type="submit">Se connecter</button>
        </form>
    </div>
</body>
</html>
